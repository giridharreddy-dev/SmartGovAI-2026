version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      SECRET_KEY: ${SECRET_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "5000"
      DEBUG_MODE: "0"
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
